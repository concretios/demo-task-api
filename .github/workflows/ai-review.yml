name: Dr. Concret.io Review
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: concretios/ai-pr-reviewer@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          submit_review_verdict: true
